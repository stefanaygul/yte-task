# Lab 1 — Service'ler
# ClusterIP: cluster içinden erişilir. Dışarıdan erişim için port-forward kullanılır.
apiVersion: v1
kind: Service
metadata:
  name: order-svc
  labels:
    app: order-svc
spec:
  type: ClusterIP
  selector:
    # Selector sadece "app: order-svc" — version'a bakmaz.
    # Bu yüzden rolling update sırasında v1 ve v2 pod'ları aynı Service'e bağlı olur
    # ve curl loop'ta karışık response görünür (Lab 1'in amacı tam da bunu göstermek).
    app: order-svc
  ports:
    - name: http
      port: 8001
      targetPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: payment-svc
  labels:
    app: payment-svc
spec:
  type: ClusterIP
  selector:
    app: payment-svc
  ports:
    - name: http
      port: 8002
      targetPort: 8002
