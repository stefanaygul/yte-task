# Lab 3 — Adım 2: WAF AÇIK, DetectionOnly modu.
#
# SecRuleEngine DetectionOnly → ModSecurity kuralları çalışır, alert üretir,
# ama isteği ENGELLEMEZ. Production'a yeni WAF açarken "izle, false positive'leri
# topla, sonra block'a geç" pattern'i için kullanılır.
#
# Loglar ingress-nginx controller pod'unda görünür:
#   kubectl logs -n ingress-nginx deploy/ingress-nginx-controller | grep -i modsecurity
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: security-lab
  annotations:
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
    # SecRuleEngine'i bu ingress için DetectionOnly yap
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine DetectionOnly
      SecAuditEngine RelevantOnly
      SecAuditLog /var/log/modsec_audit.log
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: order-svc
                port:
                  number: 8001
