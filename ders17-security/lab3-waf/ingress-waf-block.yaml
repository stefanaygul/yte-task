# Lab 3 — Adım 3: WAF AÇIK, Block modu.
#
# SecRuleEngine On → kuralları ihlal eden istekler 403 Forbidden ile reddedilir.
# OWASP CRS default paranoia level (PL1) işin çoğunu yapar; SQLi/XSS/path
# traversal/RCE pattern'leri block edilir.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: security-lab
  annotations:
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecAuditEngine RelevantOnly
      SecAuditLog /var/log/modsec_audit.log
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: order-svc
                port:
                  number: 8001
