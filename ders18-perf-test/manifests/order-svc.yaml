# order-svc deployment + service + ServiceMonitor — Ders 18 Performans Testi Lab
#
# Bu manifest BASELINE durumu temsil eder:
#   - 2 replica
#   - SIMULATED_DB_LATENCY_MS=10  (sağlıklı DB)
#   - CACHE_ENABLED=false
#   - MEMORY_LEAK=false
#
# Lab'lar bu env'leri `kubectl set env` ile değiştirir (image rebuild gerekmez):
#   Lab 2: kubectl set env deploy/order-svc SIMULATED_DB_LATENCY_MS=100
#   Lab 3: kubectl set env deploy/order-svc MEMORY_LEAK=true
#
# Service NodePort 30801 → kind cluster.yaml host 8001'e map ediyor.
# Böylece k6 host'tan http://localhost:8001 ile servise yük basar.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-svc
  labels:
    app: order-svc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-svc
  template:
    metadata:
      labels:
        app: order-svc
    spec:
      containers:
        - name: order-svc
          image: order-svc:latest
          imagePullPolicy: Never  # kind'a load edilen lokal image
          ports:
            - name: http
              containerPort: 8001
          env:
            - name: SIMULATED_DB_LATENCY_MS
              value: "10"
            - name: CACHE_ENABLED
              value: "false"
            - name: MEMORY_LEAK
              value: "false"
            - name: PAYMENT_URL
              value: "http://payment-svc:8002"
          resources:
            # HPA CPU utilization'ı request'e göre hesaplar:
            #   target %60 × request 100m = 60m → bu eşik aşılınca scale-up.
            # limit 500m → tek pod ~yarım çekirdeğe kadar çıkabilir (Lab 2 bottleneck).
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"  # MEMORY_LEAK=true ise bu limit OOM'u tetikler (Lab 3)
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: order-svc
  labels:
    app: order-svc
spec:
  type: NodePort
  selector:
    app: order-svc
  ports:
    - name: http
      port: 8001
      targetPort: 8001
      nodePort: 30801   # kind host port 8001 buraya map
---
# Prometheus bu ServiceMonitor sayesinde order-svc'nin /metrics'ini scrape eder.
# values.yaml'da serviceMonitorSelectorNilUsesHelmValues=false → label şartı yok.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: order-svc
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: order-svc
  endpoints:
    - port: http
      path: /metrics
      interval: 5s   # yük testi sırasında metrikleri sık topla
