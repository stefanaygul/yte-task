# Lab 2 — Adım 2: AUTH_MODE=jwt-gateway
#
# App validate ETMEZ. Sadece gateway'in eklediği X-User-Id header'a güvenir.
# Kripto yok → CPU ucuz. Auth maliyeti gateway'e (tek noktaya) taşınır.
#
# Workshop'ta gerçek bir external auth gateway kurmuyoruz; loadtest scripti
# X-User-Id header'ını manuel ekler. Mantık aynı: app crypto yapmıyor.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-svc
  labels:
    app: order-svc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-svc
  template:
    metadata:
      labels:
        app: order-svc
    spec:
      containers:
        - name: order-svc
          image: order-svc:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
          env:
            - name: AUTH_MODE
              value: "jwt-gateway"      # ← sadece X-User-Id header okur
            - name: JWT_SECRET
              value: "workshop-secret-key"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
